[build]
  # Upgrade npm first: Node 20's bundled npm 10.8.2 crashes on this dependency
  # tree ("Exit handler never called!"), leaving bin symlinks unlinked.
  command = "npm install -g npm@11 && npm install --no-audit --no-fund && npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback so client-side routes (react-router) resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
