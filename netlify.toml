[build]
  command = "npm install --no-audit --no-fund && npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ─────────────────────────── Redirects ───────────────────────────
# Force the /tools route to the React app (overrides any stale static file).
[[redirects]]
  from = "/tools"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/tools/*"
  to = "/index.html"
  status = 200
  force = true

# SPA fallback so client-side routes (react-router) resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─────────────────────────── Security headers ───────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

# The tools run as a same-origin <iframe> and use inline <script>/<style>, so
# they need a slightly looser script-src than the main app.
[[headers]]
  for = "/tools-app.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none'"

# ─────────────────────────── Caching ───────────────────────────
# Vite fingerprints these, so they can be cached forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
